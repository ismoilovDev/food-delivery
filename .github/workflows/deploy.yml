name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_RESTAURANT_ID: ${{ secrets.VITE_RESTAURANT_ID }}
          VITE_YANDEX_MAPS_API_KEY: ${{ secrets.VITE_YANDEX_MAPS_API_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete build/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/food-delivery/build/
          scp package.json pnpm-lock.yaml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/food-delivery/

      - name: Install deps and restart app
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/food-delivery

            # pnpm yo'q bo'lsa o'rnatish
            if ! command -v pnpm &> /dev/null; then
              npm install -g pnpm
            fi

            # pm2 yo'q bo'lsa o'rnatish
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            pnpm install --prod --frozen-lockfile

            pm2 describe food-delivery > /dev/null 2>&1 \
              && pm2 restart food-delivery \
              || pm2 start "pnpm start" --name food-delivery

            pm2 save
          EOF
